name: Run Journey Tests on GitHub

permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      test:
        description: 'Choose test suite'
        type: choice
        required: false
        default: ''
        options:
          - ''
          - 'api'
          - 'ui'
      tag:
        description: 'Choose test group'
        type: choice
        required: false
        default: ''
        options:
          - ''
          - 'smoke'
          - 'e2e'
      branch-set:
        description: 'Which branch to test (branch names must match across all repos)'
        type: string
        required: false
        default: main
  workflow_call:
    inputs:
      test:
        required: false
        type: string
        default: ''
      tag:
        required: false
        type: string
        default: ''
      branch-set:
        required: false
        type: string
        default: ${{ github.ref_name }}
      slack-webhook-url:
        required: false
        type: string
jobs:
  journey-tests:
    name: Run Journey Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout identity-service-helper referenced by branch-set input
        uses: actions/checkout@v4
        id: helper-checkout-branch
        continue-on-error: true
        with:
          repository: DEFRA/identity-service-helper
          ref: ${{ inputs.branch-set }}
          path: identity-service-helper

      - name: Checkout identity-service-helper main branch if the previous checkout failed (e.g. branch doesn't exist in helper repo)
        if: steps.helper-checkout-branch.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          repository: DEFRA/identity-service-helper
          ref: main
          path: identity-service-helper

      - name: Checkout identity-service-handler referenced by branch-set input
        uses: actions/checkout@v4
        id: handler-checkout-branch
        continue-on-error: true
        with:
          repository: DEFRA/identity-service-handler
          ref: ${{ inputs.branch-set }}
          path: identity-service-handler

      - name: Checkout identity-service-handler main branch if the previous checkout failed (e.g. branch doesn't exist in handler repo)
        if: steps.handler-checkout-branch.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          repository: DEFRA/identity-service-handler
          ref: main
          path: identity-service-handler

      - name: Checkout identity-service-journey-tests
        uses: actions/checkout@v4
        with:
          repository: DEFRA/identity-service-journey-tests
          ref: ${{ inputs.branch-set }}
          path: identity-service-journey-tests

      - name: Fix permissions for platform scripts
        shell: bash
        run: |
          chmod -R +x identity-service-helper/**/*.sh || true
          chmod -R +x identity-service-handler/**/*.sh || true
          chmod -R +x identity-service-journey-tests/**/*.sh || true

      - name: Copy identity-service-handler.env into identity-service-handler for compose
        shell: bash
        run: |
          cp identity-service-journey-tests/docker/config/identity-service-handler.env identity-service-handler/compose/identity-service-handler.env

      - name: Copy identity-service-helper.env into identity-service-helper for compose
        shell: bash
        run: |
          cp identity-service-journey-tests/docker/config/identity-service-helper.env identity-service-helper/compose/identity-service-helper.env

      - name: Generate TLS certificates for identity-service-handler
        shell: bash
        run: |
          openssl req -x509 -newkey rsa:2048 \
          -keyout identity-service-handler/certs/localhost-key.pem \
          -out identity-service-handler/certs/localhost.pem \
          -days 1 -nodes \
          -subj "/CN=identity-service-handler" \
          -addext "subjectAltName=DNS:identity-service-handler,DNS:localhost"

      # Create identity-service network early (other projects reference as external)
      - name: Ensure identity-services network exists
        shell: bash
        run: |
          if ! docker network inspect identity-services >/dev/null 2>&1; then
            docker network create \
              --label com.docker.compose.network=identity-services \
              identity-services
          fi

      # FIX: Set ROOT_DIR so Localstack init scripts mount correctly
      - name: Set ROOT_DIR for compose mounts
        run: echo "ROOT_DIR=${{ github.workspace }}" >> $GITHUB_ENV

      # Start platform (backend + UI)
      - name: Start platform
        working-directory: identity-service-journey-tests/bin
        shell: bash
        env:
          B2C_CLIENT_ID: ${{ secrets.B2C_CLIENT_ID }}
          B2C_CLIENT_SECRET: ${{ secrets.B2C_CLIENT_SECRET }}
          B2C_SERVICE_ID: ${{ secrets.B2C_SERVICE_ID }}
          NODE_ENV: development
          OIDC_SIGNING_CERT: ${{ secrets.OIDC_SIGNING_CERT }}
          OIDC_SIGNING_KEY: ${{ secrets.OIDC_SIGNING_KEY }}
          SESSION_COOKIE_PASSWORD: ${{ secrets.SESSION_COOKIE_PASSWORD }}
          TLS_ENABLED: true
        run: |
          chmod +x platform.sh
          ./platform.sh backend up && ./platform.sh frontend up

      - name: Wait for platform to stabilise
        shell: bash
        run: sleep 15

      - name: List running containers
        shell: bash
        run: docker ps -a

      - name: Debug Backend logs
        shell: bash
        run: docker logs identity-service-helper || true
      - name: Debug Backend health endpoint
        shell: bash
        run: docker compose -p identity-services exec -T identity-service-helper curl -v http://identity-service-helper:8080/health

      - name: Debug Test-Site logs
        shell: bash
        run: docker logs identity-services-test-site-1 || true
      - name: Debug Test-Site health endpoint
        shell: bash
        run: docker compose -p identity-services exec -T test-site curl -v -k https://test-site:3005/b2c/.well-known/openid-configuration || true

      - name: Debug Frontend logs
        shell: bash
        run: docker logs identity-services-identity-service-handler-1 || true
      - name: Debug Frontend health endpoint
        shell: bash
        run: docker compose -p identity-services exec -T identity-service-helper curl -v -k https://identity-service-handler:3000/health

      - name: Ensure report directories exist
        shell: bash
        run: |
          mkdir -p identity-service-journey-tests/allure-report
          mkdir -p identity-service-journey-tests/playwright-report

      - name: Run journey-tests inside Docker
        working-directory: identity-service-journey-tests
        shell: bash
        env:
          TEST_INPUT: ${{ inputs.test }}
          TAG_INPUT: ${{ inputs.tag }}
          DELEGATING_USER_WITH_MULTIPLE_CPH: ${{secrets.DELEGATING_USER_WITH_MULTIPLE_CPH}}
          DELEGATING_USER_WITH_SINGLE_CPH: ${{secrets.DELEGATING_USER_WITH_SINGLE_CPH}}
          DELEGATING_USER_WITH_NO_CPH: ${{secrets.DELEGATING_USER_WITH_NO_CPH}}
          X_API_KEY: ${{secrets.X_API_KEY}}
          X_API_OPERATOR_ID: ${{secrets.X_API_OPERATOR_ID}}
        run: |
          FILTER=""

          if [[ -n "$TEST_INPUT" ]]; then
            FILTER="$TEST_INPUT"
          fi

          if [[ -n "$TAG_INPUT" ]]; then
            if [[ -n "$FILTER" ]]; then
              FILTER="$FILTER|$TAG_INPUT"
            else
              FILTER="$TAG_INPUT"
            fi
          fi

          echo "Running tests with filter: $FILTER"

          if [[ -z "$FILTER" ]]; then
            docker compose -p identity-services -f compose.yml up --build --abort-on-container-exit
          else
            docker compose -p identity-services -f compose.yml run --rm --build journey-tests \
              sh -c "npm ci && npx playwright test --grep='$FILTER'"
          fi

      - name: Debug Inspect identity-services network
        if: always()
        shell: bash
        run: docker network inspect identity-services

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: identity-service-journey-tests/allure-results
          if-no-files-found: ignore

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: identity-service-journey-tests/playwright-report/html
          if-no-files-found: ignore

      - name: Collect Docker logs
        if: always()
        shell: bash
        run: |
          echo "Docker container logs" > logs.txt
          echo "=====================" >> logs.txt
          docker ps -a >> logs.txt

          for c in $(docker ps -a --format "{{.Names}}"); do
            echo "=====================" >> logs.txt
            echo "CONTAINER: $c" >> logs.txt
            echo "=====================" >> logs.txt
            docker logs $c >> logs.txt 2>&1 || true
          done

      - name: Upload docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: logs.txt

      - name: Publish Test Report with Insights
        uses: ctrf-io/github-test-reporter@v1
        with:
          fail-rate-report: true
          flaky-rate-report: true
          github-report: true
          insights-report: true
          pull-request-report: true
          report-path: identity-service-journey-tests/playwright-report/*.json
          slowest-report: true
          summary-delta-report: true
          upload-artifact: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: always()

      # Stop platform (UI + backend)
      - name: Stop platform
        if: always()
        working-directory: identity-service-journey-tests/bin
        shell: bash
        run: ./platform.sh frontend down && ./platform.sh backend down

      # Slack reporting is covered by CDP notification integration and is setup for DEV, Test and Ext-Test environments
