name: Run Journey Tests on GitHub

permissions:
  contents: read
  checks: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      test:
        description: 'Choose test suite'
        type: choice
        required: false
        default: ''
        options:
          - ''
          - 'api'
          - 'ui'
      tag:
        description: 'Choose test group'
        type: choice
        required: false
        default: ''
        options:
          - ''
          - 'smoke'
          - 'e2e'
  workflow_call:
    inputs:
      test:
        required: false
        type: string
        default: ''
      tag:
        required: false
        type: string
        default: ''
      branch-set:
        required: false
        type: string
        default: develop
      slack-webhook-url:
        required: false
        type: string
jobs:
  journey-tests:
    name: Run Journey Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout identity-service-helper
        uses: actions/checkout@v4
        with:
          repository: DEFRA/identity-service-helper
          ref: main
          path: identity-service-helper

      - name: Checkout identity-service-handler
        uses: actions/checkout@v4
        with:
          repository: DEFRA/identity-service-handler
          ref: main
          path: identity-service-handler

      - name: Checkout identity-service-journey-tests
        uses: actions/checkout@v4
        with:
          repository: DEFRA/identity-service-journey-tests
          ref: ${{ inputs.branch-set == 'main' && 'main' || github.ref }}
          path: identity-service-journey-tests

      - name: Fix permissions for platform scripts
        shell: bash
        run: |
          chmod -R +x identity-service-helper/**/*.sh || true
          chmod -R +x identity-service-handler/**/*.sh || true
          chmod -R +x identity-service-journey-tests/**/*.sh || true

      # Create identity-service network early (other projects reference as external)
      - name: Ensure identity-services network exists
        shell: bash
        run: |
          if ! docker network inspect identity-services >/dev/null 2>&1; then
            docker network create \
              --label com.docker.compose.network=identity-services \
              identity-services
          fi

      # FIX: Set ROOT_DIR so Localstack init scripts mount correctly
      - name: Set ROOT_DIR for compose mounts
        run: echo "ROOT_DIR=${{ github.workspace }}" >> $GITHUB_ENV

      # Start platform (backend + UI)
      - name: Start platform
        working-directory: identity-service-journey-tests/bin
        shell: bash
        run: |
          chmod +x platform.sh
          ./platform.sh backend up && ./platform.sh frontend up

      - name: Wait for platform to stabilise
        shell: bash
        run: sleep 15

      - name: List running containers
        shell: bash
        run: docker ps -a

      - name: Debug Backend logs
        shell: bash
        run: docker logs identity-services-identity-service-helper || true
      - name: Debug Backend health endpoint debug
        shell: bash
        run: docker compose -p identity-services exec -T identity-service-helper curl -v http://localhost:3001/health

      - name: Ensure report directories exist
        shell: bash
        run: |
          mkdir -p identity-service-journey-tests/allure-report
          mkdir -p identity-service-journey-tests/playwright-report

      - name: Run journey-tests inside Docker
        working-directory: identity-service-journey-tests
        shell: bash
        env:
          TEST_INPUT: ${{ inputs.test }}
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          FILTER=""

          if [[ -n "$TEST_INPUT" ]]; then
            FILTER="$TEST_INPUT"
          fi

          if [[ -n "$TAG_INPUT" ]]; then
            if [[ -n "$FILTER" ]]; then
              FILTER="$FILTER|$TAG_INPUT"
            else
              FILTER="$TAG_INPUT"
            fi
          fi

          echo "Running tests with filter: $FILTER"

          if [[ -z "$FILTER" ]]; then
            docker compose -p identity-services -f compose.yml up --build --abort-on-container-exit
          else
            docker compose -p identity-services -f compose.yml run --rm --build journey-tests \
              sh -c "npm ci && npx playwright test --grep='$FILTER'"
          fi

      - name: Debug Inspect identity-services network
        if: always()
        shell: bash
        run: docker network inspect identity-services

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: identity-service-journey-tests/allure-results
          if-no-files-found: ignore

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: identity-service-journey-tests/playwright-report/html
          if-no-files-found: ignore

      - name: Collect Docker logs
        if: always()
        shell: bash
        run: |
          echo "Docker container logs" > logs.txt
          echo "=====================" >> logs.txt
          docker ps -a >> logs.txt

          for c in $(docker ps -a --format "{{.Names}}"); do
            echo "=====================" >> logs.txt
            echo "CONTAINER: $c" >> logs.txt
            echo "=====================" >> logs.txt
            docker logs $c >> logs.txt 2>&1 || true
          done

      - name: Upload docker logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: logs.txt

      # Stop platform (UI + backend)
      - name: Stop platform
        if: always()
        working-directory: identity-service-journey-tests/bin
        shell: bash
        run: ./platform.sh frontend down && ./platform.sh backend down

      - name: Post Slack report
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ inputs.slack-webhook-url }}
          BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        working-directory: identity-service-journey-tests
        shell: bash
        run: |
          if [[ -z "$SLACK_WEBHOOK_URL" ]]; then
            echo "Slack webhook not provided; skipping"
            exit 0
          fi
          node post-slack-report.mjs
