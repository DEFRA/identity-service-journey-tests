name: Run Journey Tests on GitHub
description: 'Run journey tests for identity-service projects'

inputs:
  test:
    description: 'Choose Test suite'
    type: choice
    required: false
    default: ''
    options:
      - '@api'
      - '@ui'
  tag:
    description: 'Choose test group'
    type: choice
    required: false
    default: ''
    options:
      - '@smoke'
      - '@e2e'
  slack-webhook-url:
    required: false

runs:
  using: 'composite'
  steps:
    # Checkout the journey-tests repo
    - uses: actions/checkout@v4
      with:
        repository: DEFRA/identity-service-journey-tests
        path: identity-service-journey-tests

    # Setup Node
    - uses: actions/setup-node@v4
      with:
        node-version-file: identity-service-journey-tests/.nvmrc
        cache: npm

    # Install dependencies
    - name: Install dependencies
      working-directory: identity-service-journey-tests
      run: npm ci
      shell: bash

    # Install Playwright browsers
    - name: Install Playwright browsers
      working-directory: identity-service-journey-tests
      run: npx playwright install --with-deps
      shell: bash

    # Debug environment variables injected by CDP
    - name: Show environment variables
      shell: bash
      run: |
        echo "UI:  $IDENTITY_SERVICE_FRONTEND_BASE_URL"
        echo "API: $IDENTITY_SERVICE_BACKEND_BASE_URL"
        echo "API EXT: $IDENTITY_SERVICE_BACKEND_EXTERNAL_BASE_URL"

    # Run Playwright tests
    - name: Run Identity Service Journey Tests
      working-directory: identity-service-journey-tests
      shell: bash
      env:
        ENVIRONMENT: dev   # CDP Portal will override this with dev/test/perf-test
      run: |
        FILTER=""
        if [[ -n "${{ inputs.test }}" ]]; then FILTER="${{ inputs.test }}"; fi
        if [[ -n "${{ inputs.tag }}" ]]; then
          if [[ -n "$FILTER" ]]; then FILTER="$FILTER|${{ inputs.tag }}"; else FILTER="${{ inputs.tag }}"; fi
        fi

        echo "Running tests with filter: $FILTER"

        if [[ -z "$FILTER" ]]; then
          npx playwright test --config=playwright.config.ts
        else
          npx playwright test --config=playwright.config.ts --grep="$FILTER"
        fi

    # Upload Allure report
    - name: Upload Allure report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: identity-service-journey-tests/allure-report

    # Upload Playwright HTML report
    - name: Upload Playwright HTML report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: identity-service-journey-tests/playwright-report/html

    # Slack notification is handled on CDP Portal Notifictions side
